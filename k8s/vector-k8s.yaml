apiVersion: v1
kind: ServiceAccount
metadata: {name: vector, namespace: observability}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata: {name: vector}
rules:
  - apiGroups: [""]
    resources: [namespaces, nodes, pods]
    verbs: [list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata: {name: vector}
roleRef: {apiGroup: rbac.authorization.k8s.io, kind: ClusterRole, name: vector}
subjects:
  - {kind: ServiceAccount, name: vector, namespace: observability}
---
apiVersion: v1
kind: ConfigMap
metadata: {name: vector-config, namespace: observability}
data:
  vector.yaml: |
    sources:
      k8s_logs:
        type: kubernetes_logs
    transforms:
      enrich:
        type: remap
        inputs: [k8s_logs]
        source: |
          .service = .kubernetes.pod_labels.app || "k8s"
          .namespace = .kubernetes.pod_namespace
          lvl = "info"
          parsed, err = parse_json(.message)
          if err == null && exists(parsed.level) { lvl = downcase(string!(parsed.level)) }
          .level = lvl
    sinks:
      loki:
        type: loki
        inputs: [enrich]
        endpoint: http://loki.observability.svc.cluster.local:3100
        encoding: {codec: text}
        labels:
          service: "{{ service }}"
          namespace: "{{ namespace }}"
          level: "{{ level }}"
          cluster: "k3s-lab"
---
apiVersion: apps/v1
kind: DaemonSet
metadata: {name: vector, namespace: observability}
spec:
  selector: {matchLabels: {app: vector}}
  template:
    metadata: {labels: {app: vector}}
    spec:
      serviceAccountName: vector
      containers:
      - name: vector
        image: timberio/vector:0.49.0-debian
        args: ["--config", "/etc/vector/vector.yaml"]
        env:
          - name: VECTOR_SELF_NODE_NAME
            valueFrom: {fieldRef: {fieldPath: spec.nodeName}}
        resources:
          requests: {memory: "64Mi", cpu: "50m"}
          limits: {memory: "192Mi", cpu: "300m"}
        volumeMounts:
          - {name: config, mountPath: /etc/vector}
          - {name: var-log, mountPath: /var/log, readOnly: true}
          - {name: var-lib, mountPath: /var/lib/docker/containers, readOnly: true}
          - {name: data, mountPath: /vector-data-dir}
      volumes:
        - {name: config, configMap: {name: vector-config}}
        - {name: var-log, hostPath: {path: /var/log}}
        - {name: var-lib, hostPath: {path: /var/lib/docker/containers}}
        - {name: data, emptyDir: {}}
