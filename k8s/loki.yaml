apiVersion: v1
kind: Namespace
metadata: {name: observability}
---
apiVersion: v1
kind: ConfigMap
metadata: {name: loki-config, namespace: observability}
data:
  loki.yaml: |
    auth_enabled: false
    server: {http_listen_port: 3100}
    common:
      instance_addr: 127.0.0.1
      path_prefix: /loki
      storage: {filesystem: {chunks_directory: /loki/chunks, rules_directory: /loki/rules}}
      replication_factor: 1
      ring: {kvstore: {store: inmemory}}
    schema_config:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index: {prefix: index_, period: 24h}
    limits_config:
      retention_period: 168h
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: loki, namespace: observability}
spec:
  replicas: 1
  selector: {matchLabels: {app: loki}}
  template:
    metadata: {labels: {app: loki}}
    spec:
      containers:
      - name: loki
        image: grafana/loki:3.4.2
        args: ["-config.file=/etc/loki/loki.yaml"]
        ports: [{containerPort: 3100}]
        resources:
          requests: {memory: "256Mi", cpu: "100m"}
          limits: {memory: "512Mi", cpu: "500m"}
        volumeMounts:
          - {name: config, mountPath: /etc/loki}
          - {name: storage, mountPath: /loki}
      volumes:
        - {name: config, configMap: {name: loki-config}}
        - {name: storage, emptyDir: {}}
---
apiVersion: v1
kind: Service
metadata: {name: loki, namespace: observability}
spec:
  type: NodePort
  selector: {app: loki}
  ports: [{port: 3100, targetPort: 3100, nodePort: 31000}]
