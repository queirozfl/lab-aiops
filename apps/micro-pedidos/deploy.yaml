apiVersion: apps/v1
kind: Deployment
metadata:
  name: micro-pedidos
  labels: {app: micro-pedidos}
spec:
  replicas: 2
  selector:
    matchLabels: {app: micro-pedidos}
  template:
    metadata:
      labels: {app: micro-pedidos}
    spec:
      containers:
      - name: micro-pedidos
        image: docker.io/library/micro-pedidos:1.0
        imagePullPolicy: Never          # usa a imagem local importada
        ports: [{containerPort: 8080}]
        resources:
          requests: {memory: "256Mi", cpu: "100m"}
          limits: {memory: "384Mi", cpu: "500m"}
        livenessProbe:
          httpGet: {path: /health, port: 8080}
          initialDelaySeconds: 20
          periodSeconds: 10
        readinessProbe:
          httpGet: {path: /health, port: 8080}
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: micro-pedidos
spec:
  selector: {app: micro-pedidos}
  ports: [{port: 80, targetPort: 8080}]
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: micro-pedidos
spec:
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: micro-pedidos
            port: {number: 80}
